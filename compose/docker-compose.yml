services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${PG_USER:-openadr}
      POSTGRES_DB: ${PG_DB:-openadr}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-openadr}
      TZ: ${PG_TZ:-America/Detroit}
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-openadr}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      # Postgres 18+ expects the volume at /var/lib/postgresql (not .../data).
      - pgdata:/var/lib/postgresql

  vtn:
    # OpenADR 3.1 VTN (OpenLEADR). Auto-runs sqlx migrations on startup.
    image: ghcr.io/openleadr/openleadr-rs:v0.2.4
    ports:
      - "${VTN_PORT:-3000}:3000"
    environment:
      RUST_LOG: info
      DATABASE_URL: postgres://${PG_USER:-openadr}:${PG_PASSWORD:-openadr}@db:5432/${PG_DB:-openadr}
      OAUTH_TYPE: INTERNAL
      OAUTH_TOKEN_URL: ${OAUTH_TOKEN_URL:-http://vtn:3000/auth/token}
      OAUTH_BASE64_SECRET: ${OAUTH_BASE64_SECRET}
    depends_on:
      db:
        condition: service_healthy

  vtn-init:
    image: postgres:18
    depends_on:
      vtn:
        condition: service_started
    volumes:
      - ./openleadr/users.sql:/users.sql:ro
      - ./openleadr/wait_and_load_users.sh:/wait_and_load_users.sh:ro
    environment:
      PGHOST: db
      PGUSER: ${PG_USER:-openadr}
      PGPASSWORD: ${PG_PASSWORD:-openadr}
      PGDATABASE: ${PG_DB:-openadr}
    entrypoint: ["/bin/bash", "/wait_and_load_users.sh"]
    restart: "no"

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  tariff-engine:
    build:
      context: ..
      dockerfile: services/tariff_engine/Dockerfile
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      VTN_BASE_URL: http://vtn:3000
      OAUTH_TOKEN_URL: ${OAUTH_TOKEN_URL:-http://vtn:3000/auth/token}
      # Lab-only: oauthlib requires this for http:// token URLs.
      OAUTHLIB_INSECURE_TRANSPORT: "1"
      BL_CLIENT_ID: ${BL_CLIENT_ID:-bl-client}
      BL_CLIENT_SECRET: ${BL_CLIENT_SECRET:-bl-client}
      TARIFF_CONFIG: /config/tariff.yaml
      ENGINE_INTERVAL_SEC: ${ENGINE_INTERVAL_SEC:-5}
    volumes:
      - ../config:/config:ro
    depends_on:
      mosquitto:
        condition: service_started
      vtn-init:
        condition: service_completed_successfully

  ven-adapter:
    build:
      context: ..
      dockerfile: services/ven_adapter/Dockerfile
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      VTN_BASE_URL: http://vtn:3000
      OAUTH_TOKEN_URL: ${OAUTH_TOKEN_URL:-http://vtn:3000/auth/token}
      # Lab-only: oauthlib requires this for http:// token URLs.
      OAUTHLIB_INSECURE_TRANSPORT: "1"
      VEN_CLIENT_ID: ${VEN_CLIENT_ID:-ven-client-client-id}
      VEN_CLIENT_SECRET: ${VEN_CLIENT_SECRET:-ven-client}
      TARIFF_CONFIG: /config/tariff.yaml
      VEN_INTERVAL_SEC: ${VEN_INTERVAL_SEC:-3}
      # Weight on newest surplus sample (0.2 @ 3s ≈ 15s tracking).
      VEN_SURPLUS_EMA_ALPHA: ${VEN_SURPLUS_EMA_ALPHA:-0.2}
    volumes:
      - ../config:/config:ro
    depends_on:
      mosquitto:
        condition: service_started
      vtn-init:
        condition: service_completed_successfully
      tariff-engine:
        condition: service_started

  openevse-bridge:
    build:
      context: ..
      dockerfile: services/openevse_bridge/Dockerfile
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      # Must match the OpenEVSE WiFi gateway MQTT base topic.
      OPENEVSE_MQTT_BASE: ${OPENEVSE_MQTT_BASE:-openevse}
      OPENEVSE_I_MIN: ${OPENEVSE_I_MIN:-6}
      OPENEVSE_I_MAX: ${OPENEVSE_I_MAX:-48}
    depends_on:
      mosquitto:
        condition: service_started
      ven-adapter:
        condition: service_started

  mqtt-fixtures:
    build:
      context: ..
      dockerfile: services/mqtt_fixtures/Dockerfile
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      FIXTURE_SCENARIO: ${FIXTURE_SCENARIO:-worked_stack}
    depends_on:
      - mosquitto
      - tariff-engine
      - ven-adapter

volumes:
  pgdata:
