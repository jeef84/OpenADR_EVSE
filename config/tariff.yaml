# Active site tariff. Copy from config/examples/ and edit for your utility.
# Schema is utility-agnostic: any TOU retailer with an export opportunity cost works.
# Point services at this file via TARIFF_CONFIG (default: /config/tariff.yaml).

utility: ExampleUtility
timezone: America/Detroit
rate_schedule: residential_tou
price_source: static_yaml  # Milestone 1: YAML only. Future: realtime_* providers.

notes: >
  Placeholder fully loaded marginal import prices ($/kWh). Exclude fixed monthly
  charges. Include variable per-kWh surcharges when you update from your utility
  rate card. Export credit is the opportunity cost of consuming solar that would
  otherwise be exported (net metering credit, export tariff, etc.).

# Weekday on-peak window is local time in `timezone`.
import_rates:
  weekday:
    on_peak:
      start: "11:00"
      end: "19:00"
      price_per_kwh: 0.18
    off_peak:
      price_per_kwh: 0.14
  weekend:
    all_day:
      price_per_kwh: 0.14

export:
  credit_per_kwh: 0.07

# Hard permit gates for grid import (solar export-credit blocks unchanged).
# At or below threshold → carbon adder $0 (TOU vs bid decides).
# Above threshold → apply max_adder (blocks typical bids). Either signal can block.
# US-MIDW-MISO local-good baseline: 580 gCO2eq/kWh, 80% fossil.
carbon_price:
  enabled: true
  unavailable_behavior: max_adder  # missing MQTT → do not silently import
  co2_intensity:
    threshold_g_per_kwh: 580
    max_adder_per_kwh: 0.50
  fossil_fuel_pct:
    threshold_pct: 80
    max_adder_per_kwh: 0.50

limits:
  panel_service_headroom_kw: 7.68
  # When measured demand (solar+import-export) is above this, inflate import $/kWh
  # so the bid rejects grid import (same idea as carbon). 0 disables.
  peak_demand_limit_kw: 12.0
  peak_demand_adder_per_kwh: 0.50
  evse_max_amps: 48
  branch_max_amps: 40
  i_min_amps: 6
  # ~2.5 A holds through ~0.6 kW CT/MQTT chatter at 240 V (was 0.75).
  amp_hysteresis_amps: 2.5
  default_voltage_v: 240.0

# Deadline overlay sticky defaults (HA helpers may override over MQTT).
# Missing/zero parked SOC uses assumed_soc_pct so carbon/price cannot leave the car unready.
ready_by:
  enabled: true
  cushion_hours: 0.25
  assumed_soc_pct: 40
  battery_capacity_kwh: 74.7
  target_soc_pct: 85
  ready_by_time: "07:00"
